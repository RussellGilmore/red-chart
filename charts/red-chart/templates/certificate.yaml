{{- if and .Values.certificate.enabled (eq .Values.routingMode "legacy") }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "red-chart.fullname" . }}-cert
  namespace: {{ .Values.gateway.namespace | quote }}
  labels:
    {{- include "red-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate
spec:
  secretName: {{ include "red-chart.fullname" . }}-cert-tls
  duration: {{ .Values.certificate.duration | quote }}
  renewBefore: {{ .Values.certificate.renewBefore | quote }}
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  dnsNames:
    - {{ include "red-chart.fqdn" . }}
  issuerRef:
    name: {{ .Values.certificate.issuer }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}

{{- if and .Values.certificate.enabled (eq .Values.routingMode "gatewayapi") }}
---
# In gatewayapi mode, cert-manager provisions the certificate via the
# cert-manager.io/cluster-issuer annotation on the Gateway resource.
# Enable this explicit Certificate only if annotation-based provisioning
# is not working or you need fine-grained control over certificate settings.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "red-chart.fullname" . }}-cert
  namespace: {{ .Values.gateway.namespace | quote }}
  labels:
    {{- include "red-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate
spec:
  secretName: {{ include "red-chart.fullname" . }}-cert-tls
  duration: {{ .Values.certificate.duration | quote }}
  renewBefore: {{ .Values.certificate.renewBefore | quote }}
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  dnsNames:
    - {{ include "red-chart.fqdn" . }}
  issuerRef:
    name: {{ .Values.certificate.issuer }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
